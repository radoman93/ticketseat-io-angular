<div class="absolute" *mobxAutorun [ngStyle]="arcStyles">
  <!-- Arc-row chairs -->
  <div class="absolute w-full h-full left-0 top-0">
    <div class="absolute top-0 left-0"
         style="margin-left:calc(var(--ts-chair-size) / -2);margin-top:calc(var(--ts-chair-size) / -2)"
         *ngFor="let seat of chairStyles; let i = index"
         [style.transform]="seat.transform">
      <div class="ts-chair"
           (click)="onChairClick($event, seat)"
           (mousedown)="onChairMouseDown($event, seat)"
           (mouseenter)="onChairHover(seat)"
           [title]="getSeatTitle(seat)">
        <svg viewBox="-17 -17 34 34">
          <g [attr.transform]="'rotate(' + seat.backRotation + ')'">
            <path d="M -12 0 A 12 12 0 1 0 12 0 Z"
                  fill="#F4ECDB" stroke="#B89E70" stroke-width="1.4"/>
          </g>
          <circle cx="0" cy="0" r="6.5"
                  [attr.fill]="getSvgPadColors(seat).fill"
                  [attr.stroke]="getSvgPadColors(seat).stroke" stroke-width="0.8"/>
          <text *ngIf="chairLabelVisible" x="0" y="0.5" text-anchor="middle" dominant-baseline="central"
                font-family="Inter,sans-serif" font-size="8" font-weight="500"
                [attr.fill]="getSvgPadColors(seat).fill === '#B8331C' ? '#fff' : '#5C5446'">{{ seat.label }}</text>
        </svg>
        <div *ngIf="seat.isSelected && !isEffectivePreview && viewerStore.isEditorMode"
             class="absolute inset-0 rounded-full ts-glow-accent opacity-40 animate-ping z-0"></div>
        <div *ngIf="seat.isSelected && !isEffectivePreview && viewerStore.isEditorMode"
             class="absolute -inset-2 rounded-full ts-glow-accent-soft blur-sm animate-pulse z-0"></div>
        <div *ngIf="seat.chair && viewerStore.isViewerMode && viewerStore.isSeatSelectedForReservation(seat.chair.id)"
             class="absolute inset-0 rounded-full ts-glow-accent opacity-50 animate-ping z-0"></div>
        <div *ngIf="seat.chair && viewerStore.isViewerMode && viewerStore.isSeatSelectedForReservation(seat.chair.id)"
             class="absolute -inset-3 rounded-full ts-glow-accent-soft blur-md animate-pulse z-0"></div>
      </div>
    </div>
  </div>

  <!-- Arc row label -->
  <div *ngIf="((arcRowData?.name || name) && !isEffectivePreview) && rowLabelVisible"
       class="absolute text-xs font-medium whitespace-nowrap"
       style="color: var(--ts-ink-soft); transform: translate(-50%, -50%)"
       [ngStyle]="labelPosition">
    {{ arcRowData?.name || name }}
  </div>
</div>
