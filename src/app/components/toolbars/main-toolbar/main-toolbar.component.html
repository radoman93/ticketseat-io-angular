<div class="ts-tool-rail-inner">
  <button *ngFor="let tool of tools"
    class="ts-tool-btn"
    [class.ts-tool-active]="isToolActive(tool.type)"
    (click)="toggleTool(tool.type)"
    [title]="tool.label">
    <img [src]="getToolbarIcon(tool.icon, isToolActive(tool.type))"
         class="ts-tool-icon"
         [alt]="tool.label" />
  </button>
</div>
