<!-- === TOP BAR === -->
<div class="ts-topbar">
  <div class="ts-topbar-left">
    <div class="ts-logo">T</div>
    <span class="ts-topbar-title">Layout Editor</span>
    <span class="ts-topbar-subtitle" *mobxAutorun>· {{ layoutStore.tableCount }} tables</span>
  </div>
  <div class="ts-topbar-right">
    <span class="ts-autosave">Auto-saved</span>
    <button class="ts-btn" (click)="openExportDialog()" title="Export">Export</button>
    <button class="ts-btn ts-btn-primary" (click)="openImportDialog()" title="Import">Import</button>
  </div>
</div>

<!-- === SUB-TOOLBAR === -->
<div class="ts-subtoolbar">
  <!-- Undo/Redo -->
  <div class="ts-toolbar-group">
    <button class="ts-icon-btn" (click)="historyStore.undo()" [disabled]="!historyStore.canUndo" title="Undo (Ctrl+Z)">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M9 14L4 9l5-5M4 9h10a6 6 0 110 12H8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="ts-icon-btn" (click)="historyStore.redo()" [disabled]="!historyStore.canRedo" title="Redo (Ctrl+Y)">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M15 14l5-5-5-5M20 9H10a6 6 0 100 12h6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="ts-divider"></div>

  <!-- Grid Controls -->
  <div class="ts-toolbar-group" *mobxAutorun>
    <span class="ts-mono-label">GRID</span>
    <select class="ts-field-inline"
            [value]="store.gridSize"
            (change)="updateGridSize($event)">
      <option *ngFor="let size of gridSizes" [value]="size">{{ size }} px</option>
    </select>
    <label class="ts-toggle-label">
      <span class="ts-toggle-track" [class.ts-toggle-on]="store.showGrid" (click)="store.toggleGrid()">
        <span class="ts-toggle-thumb"></span>
      </span>
      <span class="ts-mono-label">SHOW</span>
    </label>
    <label class="ts-toggle-label">
      <span class="ts-toggle-track" [class.ts-toggle-on]="store.snapToGrid" (click)="store.toggleSnapToGrid()">
        <span class="ts-toggle-thumb"></span>
      </span>
      <span class="ts-mono-label">SNAP</span>
    </label>
  </div>

  <div class="ts-divider"></div>

  <!-- Coordinates -->
  <div class="ts-toolbar-group hidden xl:flex" *mobxAutorun>
    <span class="ts-mono-label">X {{ store.mousePosition.x.toFixed(0) }}  Y {{ store.mousePosition.y.toFixed(0) }}</span>
  </div>

  <div class="flex-1"></div>

  <!-- Zoom -->
  <div class="ts-toolbar-group" *mobxAutorun>
    <button class="ts-zoom-btn" (click)="store.adjustZoom(-5)">−</button>
    <span class="ts-mono-label ts-zoom-value">{{ store.zoomLevel.toFixed(0) }}%</span>
    <button class="ts-zoom-btn" (click)="store.adjustZoom(5)">+</button>
  </div>

  <div class="ts-divider hidden sm:block"></div>

  <!-- Stats -->
  <div class="ts-toolbar-group hidden sm:flex" *mobxAutorun>
    <span class="ts-mono-label">{{ layoutStore.tableCount }} TABLES</span>
  </div>

  <!-- Layers / Objects Panel Toggle -->
  <button class="ts-icon-btn" (click)="toggleLayers.emit()" title="Toggle Objects Panel">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</div>

<!-- Dialogs -->
<app-export-dialog [isOpen]="showExportDialog" (close)="showExportDialog = false"></app-export-dialog>
<app-import-dialog [isOpen]="showImportDialog" (close)="showImportDialog = false"></app-import-dialog>
