<div class="absolute" *mobxAutorun
     [style.left]="x + 'px'"
     [style.top]="y + 'px'"
     [style.transform]="'translate(-50%, -50%) rotate(' + rotation + 'deg)'">
  <div class="table-rectangle ts-rect-table flex justify-center items-center z-10"
       [style.width]="(width) + 'px'"
       [style.height]="(height) + 'px'"
       [class.ts-table-selected]="tableData && tableData.id && store.selectionStore.isItemSelected(tableData.id)">
    <span *ngIf="tableLabelVisible" class="ts-table-label">{{ name }}</span>
  </div>

  <!-- Rectangle Table Chairs -->
  <div class="absolute w-full h-full left-0 top-0">
    <div class="absolute top-1/2 left-1/2"
         style="margin-left:calc(var(--ts-chair-size) / -2);margin-top:calc(var(--ts-chair-size) / -2)"
         *ngFor="let chair of chairStyles; let i = index"
         [style.transform]="chair.transform">
      <div class="ts-chair"
           (click)="onChairClick($event, chair)"
           (mousedown)="onChairMouseDown($event, chair)"
           (mouseenter)="onChairHover(chair)"
           [title]="getSeatTitle(chair)">
        <svg viewBox="-17 -17 34 34" >
          <g [attr.transform]="'rotate(' + getChairBackRotation(chair.side) + ')'">
            <path d="M -12 0 A 12 12 0 1 0 12 0 Z"
                  fill="#F4ECDB" stroke="#B89E70" stroke-width="1.4"/>
          </g>
          <circle cx="0" cy="0" r="6.5"
                  [attr.fill]="getSvgPadColors(chair).fill"
                  [attr.stroke]="getSvgPadColors(chair).stroke" stroke-width="0.8"/>
          <text *ngIf="chairLabelVisible" x="0" y="0.5" text-anchor="middle" dominant-baseline="central"
                font-family="Inter,sans-serif" font-size="8" font-weight="500"
                [attr.fill]="getSvgPadColors(chair).fill === '#B8331C' ? '#fff' : '#5C5446'">{{ chair.label }}</text>
        </svg>
        <div *ngIf="chair.isSelected && viewerStore.isEditorMode"
             class="absolute inset-0 rounded-full ts-glow-accent opacity-40 animate-ping z-0"></div>
        <div *ngIf="chair.isSelected && viewerStore.isEditorMode"
             class="absolute -inset-2 rounded-full ts-glow-accent-soft blur-sm animate-pulse z-0"></div>
        <div *ngIf="chair.chair && viewerStore.isViewerMode && viewerStore.isSeatSelectedForReservation(chair.chair.id)"
             class="absolute inset-0 rounded-full ts-glow-accent opacity-50 animate-ping z-0"></div>
        <div *ngIf="chair.chair && viewerStore.isViewerMode && viewerStore.isSeatSelectedForReservation(chair.chair.id)"
             class="absolute -inset-3 rounded-full ts-glow-accent-soft blur-md animate-pulse z-0"></div>
      </div>
    </div>
  </div>
</div>
