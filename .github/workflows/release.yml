name: Release and Publish

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'STYLING_GUIDE.md'
      - '.gitignore'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        registry-url: 'https://npm.pkg.github.com'

    - name: Install dependencies
      run: npm ci

    - name: Build library
      run: npm run build

    - name: Determine next version
      id: version
      run: |
        # Fetch all tags from the remote to ensure we have the latest ones
        git fetch --tags
        
        # Get the latest semver tag. If no tags are found, default to 0.0.0 so the first version will be 0.1.0.
        LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n 1)
        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="v0.0.0"
        fi
        echo "Latest tag: $LATEST_TAG"
        
        # Determine bump type from ALL conventional commits since the latest tag
        # (not just the last commit) so an interim chore/ci commit can't downgrade
        # the bump derived from an earlier feat/fix.
        if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
          RANGE="$LATEST_TAG..HEAD"
        else
          RANGE="HEAD"
        fi
        COMMIT_MSGS=$(git log $RANGE --pretty=%B)

        if echo "$COMMIT_MSGS" | grep -qE '^(feat|feature)(\(.+\))?!:' || echo "$COMMIT_MSGS" | grep -q 'BREAKING CHANGE'; then
          BUMP_TYPE="major"
        elif echo "$COMMIT_MSGS" | grep -qE '^feat(\(.+\))?:'; then
          BUMP_TYPE="minor"
        else
          BUMP_TYPE="patch"
        fi
        echo "Version bump type: $BUMP_TYPE"
        
        # Calculate the next version using a simple bash script
        CURRENT_VERSION=${LATEST_TAG#v}
        IFS='.' read -r -a V <<< "$CURRENT_VERSION"
        MAJOR=${V[0]}
        MINOR=${V[1]}
        PATCH=${V[2]}
        
        case $BUMP_TYPE in
          "major")
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          "minor")
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          "patch")
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Next version: $NEW_VERSION"

    - name: Update package.json versions
      run: |
        npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version --allow-same-version
        cd dist
        npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version --allow-same-version
        cd ..

    - name: Commit version bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Commit the root package.json + lockfile (not the copy in dist).
        # Skip cleanly if there's nothing to commit (e.g. the version was already
        # bumped manually) so the job doesn't fail on an empty commit.
        git add package.json package-lock.json
        if git diff --staged --quiet; then
          echo "No version change to commit — already at v${{ steps.version.outputs.new_version }}"
        else
          git commit -m "chore: bump version to v${{ steps.version.outputs.new_version }}"
        fi

    - name: Create and push Git tag
      run: |
        git push
        if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
          echo "Tag v${{ steps.version.outputs.new_version }} already exists — skipping"
        else
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"
        fi

    - name: Publish to GitHub Packages
      run: |
        cd dist
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: Release v${{ steps.version.outputs.new_version }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}